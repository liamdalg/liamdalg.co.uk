<header class="site-header">
    <nav class="wrapper">
        <a href="{{ .Site.Home.RelPermalink }}" class="site-title" {{ if .IsHome }}aria-current="page"{{ end }}>{{ .Site.Title }}</a>
        <ul class="nav-links">
            {{ range .Site.Menus.main }}
            <li><a href="{{ .URL }}" {{ if $.IsMenuCurrent "main" . }}aria-current="page"{{ end }}>{{ .Name }}</a></li>
            {{ end }}
        </ul>
        <button id="theme-toggle" aria-label="Toggle dark/light theme">◐</button>
    </nav>
</header>
